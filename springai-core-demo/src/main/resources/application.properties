spring.application.name=springai-core-demo

# ===== 控制台应用：不启动 Web 服务器 =====
spring.main.web-application-type=none

# ===== DeepSeek 对话模型配置 =====
# API Key 从环境变量读取，避免把密钥写进代码：export DEEPSEEK_API_KEY=你的key
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
# DeepSeek 接口地址（默认即为官方地址，这里显式写出便于了解）
spring.ai.deepseek.base-url=https://api.deepseek.com
# 模型名：deepseek-chat（通用对话），也可换成 deepseek-reasoner（深度推理）
spring.ai.deepseek.chat.options.model=deepseek-chat
# 采样温度：0~2，越大越发散，越小越确定
spring.ai.deepseek.chat.options.temperature=0.7

# ===== 本地向量（Embedding）模型 =====
# spring-ai-starter-model-transformers 会自动装配本地 ONNX 向量模型，无需额外配置。
# 首次运行会下载模型文件（~90MB）。若下载慢，可设置 HuggingFace 镜像环境变量：
#   export HF_ENDPOINT=https://hf-mirror.com

# ===== 让控制台菜单更清爽 =====
logging.level.root=WARN
spring.main.banner-mode=off
