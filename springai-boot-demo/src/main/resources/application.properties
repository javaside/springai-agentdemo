spring.application.name=springai-boot-demo

# ===== 控制台应用：不启动 Web 服务器 =====
spring.main.web-application-type=none

# ===== DeepSeek 对话模型（starter 会据此自动配置 ChatModel）=====
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.base-url=https://api.deepseek.com

# ===== 本地向量模型 =====
# spring-ai-starter-model-transformers 会自动配置 EmbeddingModel，无需额外配置。
# 首次运行会下载模型文件（~90MB）。若慢，可设置镜像：export HF_ENDPOINT=https://hf-mirror.com

# ===== MCP 客户端（默认不连接任何 Server）=====
# 取消下面注释、并安装 Node.js 后，即可连接官方“文件系统”MCP Server：
# spring.ai.mcp.client.stdio.connections.fs.command=npx
# spring.ai.mcp.client.stdio.connections.fs.args=-y,@modelcontextprotocol/server-filesystem,/tmp

# ===== 让控制台菜单更清爽 =====
logging.level.root=WARN
spring.main.banner-mode=off
# 屏蔽 MCP 传输层 netty 在 macOS 上关于可选原生库的无害报错（不影响功能）
logging.level.io.netty.resolver.dns=OFF
