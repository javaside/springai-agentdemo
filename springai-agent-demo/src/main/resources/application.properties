spring.application.name=springai-agent-demo

# ===== 控制台应用：不启动 Web 服务器 =====
spring.main.web-application-type=none

# ===== DeepSeek 对话模型配置 =====
spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY:}
spring.ai.deepseek.base-url=https://api.deepseek.com
spring.ai.deepseek.chat.options.model=deepseek-chat
spring.ai.deepseek.chat.options.temperature=0.7

# ===== MCP 客户端（默认不连接任何 Server）=====
# 取消下面注释、并安装 Node.js 后，即可连接官方“文件系统”MCP Server，
# 让模型获得读写文件的能力（详见 McpDemo 的运行提示）：
# spring.ai.mcp.client.stdio.connections.fs.command=npx
# spring.ai.mcp.client.stdio.connections.fs.args=-y,@modelcontextprotocol/server-filesystem,/tmp

# ===== 让控制台菜单更清爽 =====
logging.level.root=WARN
spring.main.banner-mode=off
